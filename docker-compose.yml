services:
  api:
    build:
      context: .
    container_name: market-data-insights-api
    environment:
      ENVIRONMENT: local
      DATABASE_URL: postgresql+psycopg://market_user:market_password@postgres:5432/market_data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: market-data-insights-postgres
    environment:
      POSTGRES_USER: market_user
      POSTGRES_PASSWORD: market_password
      POSTGRES_DB: market_data
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U market_user -d market_data"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
